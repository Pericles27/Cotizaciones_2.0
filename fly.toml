# Config de Fly.io para apps/api.
#
#   1) flyctl launch --no-deploy   (genera la app en tu cuenta usando este toml)
#   2) flyctl secrets set IOL_USERNAME=... IOL_PASSWORD=... CORS_ORIGIN=https://<tu-sitio>.netlify.app
#   3) flyctl deploy
#
# La región `gru` (São Paulo) es la más cercana a AR; cambialo si querés otra.

app             = "cotizaciones-api"
primary_region  = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV          = "production"
  PORT              = "3001"
  CACHE_TTL_SECONDS = "30"

[http_service]
  internal_port        = 3001
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    interval      = "30s"
    timeout       = "5s"
    grace_period  = "10s"
    method        = "GET"
    path          = "/health"

[[vm]]
  size        = "shared-cpu-1x"
  memory      = "256mb"
  cpu_kind    = "shared"
  cpus        = 1
