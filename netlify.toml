# Netlify deploy config para apps/web (Vite + React).
# El backend (apps/api) se deploya por separado en Fly.io / Railway.

[build]
  base    = "."
  # Updateamos corepack antes de activarlo: la versión que trae Node 20.x tiene
  # un bug de verificación de firmas ("Cannot find matching keyid") que rompe
  # `corepack prepare pnpm@...`.
  command = "npm install -g corepack@latest && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @cotizaciones/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION   = "20.18.0"
  PNPM_VERSION   = "9.15.0"
  NPM_FLAGS      = "--no-audit --no-fund"

# Fallback para el SPA — todas las rutas resuelven al index.html y el router se encarga.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache largo para assets versionados de Vite (los nombres incluyen hash).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El index.html no se cachea (así toman los nuevos hashes en cada deploy).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Headers de seguridad.
#
# Content-Security-Policy:
#   - default-src 'self'          → solo recursos del mismo origen por defecto
#   - script-src 'self'           → solo scripts propios (Vite los inlinea con hash si hace falta)
#   - style-src 'self' 'unsafe-inline' → Tailwind genera estilos inline en algunos casos
#   - img-src 'self' data:        → imágenes propias + data URIs (ej. favicon SVG inline)
#   - connect-src 'self' https:   → fetch() solo a HTTPS (permite llamar a la API en Railway/Fly)
#   - font-src 'self'             → fuentes solo del origen
#   - frame-ancestors 'none'      → equivale a X-Frame-Options DENY pero más moderno
#   - base-uri 'self'             → evita inyección de <base> maliciosas
#   - form-action 'self'          → formularios solo al mismo origen
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    X-Frame-Options        = "DENY"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
